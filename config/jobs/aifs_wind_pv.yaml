# Wind / PV / electricity-trading oriented variable subset for AIFS.
# Reference an external source template by name (config/sources/aifs.yaml).
source: aifs

time:
  # Each of date / cycle / steps accepts: single value, list, or range.
  # See README §4.2 for the full syntax. Examples:
  #   date: 20260507                      # one day
  #   date: [20260501, 20260502]          # explicit list
  #   date: "20260501-20260507"           # inclusive range (string short form)
  #   date: { start: 20260501, end: 20260507 }   # range (mapping form)
  #   cycle: 0           # or [0, 12], or "0,12"
  #   steps: [0]         # explicit list
  #   steps: "0-120:6"   # 0..120h inclusive, 6h step
  #   steps: "0/120/6"   # MARS short form
  date: yesterday
  cycle: 12
  steps: all

variables:
  - name: surface_wind_temp_pressure_cloud_radiation
    levtype: sfc
    params:
      # near-surface wind for wind power forecasting
      - 10u
      - 10v
      - 100u
      - 100v
      # temperature / dewpoint / pressure
      - 2t
      - 2d
      - msl
      - sp
      # cloud cover (drives PV)
      - tcc
      - lcc
      - mcc
      - hcc
      # short-/long-wave radiation + total precip
      - ssrd
      - strd
      - tp

  - name: pressure_level_wind_thermo
    levtype: pl
    # AIFS exposes 925 hPa (no 950 hPa); 925 stands in for hub-height layer.
    levels: ["850", "925", "1000"]
    params:
      - u
      - v
      - t
      - q
      - z

download:
  # Layout: examples_output/<source>/<date>/<cycle>z/f<step>.subset.grib2 (DownloadConfig defaults).
  output_dir: examples_output
  workers: 6              # byte-range concurrency within one step
  gap_tolerance: 0        # bytes; raise to merge nearby ranges into fewer requests
  timeout_seconds: 120
  max_attempts: 4
  init_concurrency: 2     # how many (date, cycle) inits to download in parallel
