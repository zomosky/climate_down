# Renewable-energy / power-trading variable subset for ECMWF IFS-HRES 0.25°.
# Mirrors config/jobs/gfs_renewables.yaml group-for-group; IFS provides a richer
# pressure-level set than AIFS (adds r/RH, gh/geopot height, d/divergence,
# vo/vorticity), and additional surface radiation components (ssr/str/ttr net).
#   * 80 m height fields absent (IFS exposes 10 m + 100 m only)
#   * Cloud-layer slabs not published (only tcc total)
#   * PWAT replaced by tcwv (total column water vapour)
# References config/sources/ifs.yaml (oper/fc, 00z/12z only).

source: ifs

time:
  #date: yesterday
  date: "20260401-20260501"
  cycle: [12]
  steps: all

variables:
  # ── Hub-height + reference winds ──────────────────────────────
  - name: wind_100m
    levtype: sfc
    params: [100u, 100v]

  - name: wind_10m
    levtype: sfc
    params: [10u, 10v]

  - name: wind_gust_10m
    levtype: sfc
    params: [10fg]

  # ── 850 hPa synoptic flow (full IFS set: u, v, t, q, r, gh) ───
  - name: pl_850
    levtype: pl
    levels: ["850"]
    params: [u, v, t, q, r, gh]

  # ── Temperature: 2 m + skin + 3h min/max ──────────────────────
  - name: temp_2m
    levtype: sfc
    params: [2t]

  - name: temp_skin
    levtype: sfc
    params: [skt]

  - name: temp_minmax_3h
    levtype: sfc
    params: [mn2t3, mx2t3]

  # ── Humidity: 2 m dewpoint + total column water vapour ────────
  - name: humidity_2m
    levtype: sfc
    params: [2d]

  # ── Surface + MSL pressure ────────────────────────────────────
  - name: pressure_sfc
    levtype: sfc
    params: [sp]

  - name: pressure_msl
    levtype: sfc
    params: [msl]

  # ── Radiation: downward + net solar/thermal/top-of-atm ────────
  - name: radiation_surface
    levtype: sfc
    params: [ssrd, strd, ssr, str, ttr]

  # ── Cloud cover (only total exposed by IFS) ───────────────────
  - name: cloud_total
    levtype: sfc
    params: [tcc]

  # ── Precipitation (total / convective / snowfall / runoff) ────
  - name: precip
    levtype: sfc
    params: [tp, cp, sf, ro]

  - name: tcwv_column
    levtype: sfc
    params: [tcwv]

  # ── CAPE for convection / ramping diagnostics ─────────────────
  - name: cape
    levtype: sfc
    params: [mucape]

download:
  # Layout: output/<source>/<date>/<cycle>z/f<step>.subset.grib2 (DownloadConfig defaults).
  # output_dir: output
  output_dir: /Users/zmy/pycharm/climate_pipeline/climate_data 
  workers: 8
  gap_tolerance: 0
  timeout_seconds: 120
  max_attempts: 4
  init_concurrency: 2
