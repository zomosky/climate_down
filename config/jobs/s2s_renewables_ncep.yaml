# Renewable-energy variable subset for NCEP CFSv2 S2S.
# Per config/s2s_catalogue.yaml: max leadtime 1056h (44 days, shortest
# of the 5 curated centres), inst grid 6h, pressure grid 24h, daily init
# 00z, ensemble 16 (4 lagged inits per day × 4 members).
#
# Variable set comparable to ECMWF (full single-level subset incl. MSLP).
#
#   single_inst   ~36 MB  10u 10v msl + tp ssrd strd        177 step (6h * 44d)
#   single_daily  ~12 MB  2t 2d tcc                          44 step (24h windows)
#   pressure_low  ~10 MB  u v t z @ 925/1000 hPa             44 step (24h * 44d)
#                                                            ──────
#                                                            ~60 MB / init
source: s2s_ncep

time:
  date: yesterday
  cycle: 0
  leadtime:
    start: 0
    end: 1056         # 44 days
    step: 6

groups:
  - name: single_inst
    level_type: single_level
    leadtime_kind: instant
    variables:
      - 10_m_u_component_of_wind
      - 10_m_v_component_of_wind
      - mean_sea_level_pressure
      - total_precipitation
      - surface_solar_radiation_downwards
      - surface_thermal_radiation_downwards

  - name: single_daily
    level_type: single_level
    leadtime_kind: daily
    leadtime:
      start: 0
      end: 1056
      step: 24
    variables:
      - 2_m_temperature
      - 2_m_dewpoint_temperature
      - total_cloud_cover

  - name: pressure_low
    level_type: pressure
    leadtime_kind: instant
    leadtime:
      start: 0
      end: 1056
      step: 24
    levels: ["925", "1000"]
    variables:
      - u_component_of_wind
      - v_component_of_wind
      - temperature
      - geopotential_height

download:
  output_dir: output
  init_concurrency: 1
  request_timeout_seconds: 7200
