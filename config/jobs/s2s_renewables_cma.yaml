# Renewable-energy variable subset for CMA S2S.
# Per config/s2s_catalogue.yaml: max leadtime 1440h (60d), inst grid 6h,
# pressure grid 24h, daily init 00z, ensemble 4.
# Variable set mirrors ECMWF (CMA's BCC-CPSv3 carries the same fields).
#
# Layout of the 3 retrieve calls (sizes ~50 % larger than ECMWF for the
# daily-averaged group, verified during capability probe):
#   single_inst   ~50 MB  10u 10v msl + tp ssrd strd        241 step (6h * 60d)
#   single_daily  ~18 MB  2t 2d total_cloud_cover            60 step (24h windows)
#   pressure_low  ~12 MB  u v t z @ 925/1000 hPa             60 step (24h * 60d)
#                                                            ──────
#                                                            ~80 MB / init
source: s2s_cma

time:
  date: yesterday
  cycle: 0
  leadtime:
    start: 0
    end: 1440         # 60 days (CMA-specific)
    step: 6

groups:
  - name: single_inst
    level_type: single_level
    leadtime_kind: instant
    variables:
      - 10_m_u_component_of_wind
      - 10_m_v_component_of_wind
      - mean_sea_level_pressure
      - total_precipitation
      - surface_solar_radiation_downwards
      - surface_thermal_radiation_downwards

  - name: single_daily
    level_type: single_level
    leadtime_kind: daily
    leadtime:
      start: 0
      end: 1440
      step: 24
    variables:
      - 2_m_temperature
      - 2_m_dewpoint_temperature
      - total_cloud_cover

  # Pressure-level data is published only every 24h on ECDS for all centres.
  - name: pressure_low
    level_type: pressure
    leadtime_kind: instant
    leadtime:
      start: 0
      end: 1440
      step: 24
    levels: ["925", "1000"]
    variables:
      - u_component_of_wind
      - v_component_of_wind
      - temperature
      - geopotential_height

download:
  output_dir: output
  init_concurrency: 1
  request_timeout_seconds: 7200
