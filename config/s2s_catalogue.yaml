# S2S forecast centres — local capability index for the ECDS s2s-forecasts
# collection (snapshot 2026-05-15, derived from constraints endpoint).
#
# Use this file as a quick lookup when picking variables / leadtimes for
# a per-centre job config under config/jobs/s2s_renewables_<centre>.yaml.
# The exhaustive machine-readable mirror lives at config/s2s/_capabilities.json
# and is regenerated by scripts/build_s2s_catalogue.py.
#
# Coverage (per current project scope): ECMWF, CMA, IAP-CAS, NCEP, UKMO.
# Other 8 origins exposed by ECDS (bom, cnr_isac, cnrm, cptec, eccc, hmcr,
# jma, kma) are listed in _capabilities.json but not curated here.

meta:
  collection: s2s-forecasts
  snapshot: "2026-05-15"
  ecds_form_url: "https://ecds.ecmwf.int/datasets/s2s-forecasts"
  ecds_api_url: "https://ecds.ecmwf.int/api"
  s2s_project_models_url: "https://confluence.ecmwf.int/display/S2S/Models"
  delay_to_realtime_hours: 48   # registered users; 1w / 3w with extra licences
  forecast_types_available: [control_forecast, perturbed_forecast]

# ── Conventions used below ─────────────────────────────────────────────────
# leadtime.inst_step_h     6h  : single_level instantaneous + accumulated grid
# leadtime.daily_window_h  24h : single_level daily-averaged windows (`0_24` …)
# leadtime.pressure_step_h 24h : *all* pressure-level data (uniform across centres)
# init_time always 00:00 UTC (12:00 also enumerated by form but no centre uses it)

# ── Variable categories ────────────────────────────────────────────────────
# Names below are the ECDS short labels used in `variable:` API field. CN
# explanations follow each entry. See ECMWF parameter database for GRIB
# shortName / units (link beside category).
variables:
  reference_url: "https://codes.ecmwf.int/grib/param-db/"

  surface_instant:        # leadtime_kind=instant on single_level (6h grid)
    - name: 10_m_u_component_of_wind        # 10u, m/s, 10m 风 u 分量
    - name: 10_m_v_component_of_wind        # 10v, m/s, 10m 风 v 分量
    - name: mean_sea_level_pressure         # msl, Pa, 海平面气压 (ECMWF/CMA/NCEP only)
    - name: surface_pressure                # sp,  Pa, 地面气压 (所有中心都有)
    - name: total_precipitation             # tp,  m,  累计降水 (since init)
    - name: surface_solar_radiation_downwards    # ssrd, J/m², 累计向下短波
    - name: surface_thermal_radiation_downwards  # strd, J/m², 累计向下长波

  surface_daily:          # leadtime_kind=daily on single_level (24h windows)
    - name: 2_m_temperature                 # 2t,  K,  2m 气温 daily mean
    - name: 2_m_dewpoint_temperature        # 2d,  K,  2m 露点 daily mean
    - name: total_cloud_cover               # tcc, 0-1, 总云量 daily mean

  pressure:               # leadtime_kind=instant on pressure (24h grid)
                          # 同一 6 个变量 × 10 个标准层在所有 5 家中心都可用
    - name: u_component_of_wind             # u,   m/s
    - name: v_component_of_wind             # v,   m/s
    - name: temperature                     # t,   K
    - name: geopotential_height             # gh,  gpm (CMA/UKMO 用 z 也可)
    - name: specific_humidity               # q,   kg/kg
    - name: vertical_velocity               # w,   Pa/s

  pressure_levels:        # 10 levels available everywhere (subset on demand)
    - "10_hpa"
    - "50_hpa"
    - "100_hpa"
    - "200_hpa"
    - "300_hpa"
    - "500_hpa"
    - "700_hpa"
    - "850_hpa"
    - "925_hpa"
    - "1000_hpa"

# ── Per-origin curated metadata ────────────────────────────────────────────
origins:

  ecmwf:
    label: "ECMWF (Europe)"
    model: "IFS-ENS extended"
    max_leadtime_h: 1104          # 46 天
    leadtime:
      inst_step_h: 6
      daily_window_h: 24
      pressure_step_h: 24
    init:
      cadence: "Mon + Thu 00z"    # 每周二次
      cycles: [0]
    ensemble:
      control: 1
      perturbed_total: 51         # 50 pf + 1 cf
    level_types_available: [single_level, pressure, isentropic, oceanic]
    notes:
      - "单层 instantaneous 步长 6h；daily-averaged 步长 24h 窗口"
      - "压力层只发 24h 步长 (47 step / init)"
      - "准点 license 接受后 48h 延迟"

  cma:
    label: "CMA (China — Beijing Climate Centre BCC-CPS)"
    model: "BCC-CPSv3 (T106L40 atmos + MOM4 ocean)"
    max_leadtime_h: 1440          # 60 天
    leadtime:
      inst_step_h: 6
      daily_window_h: 24
      pressure_step_h: 24
    init:
      cadence: "daily 00z"
      cycles: [0]
    ensemble:
      control: 1
      perturbed_total: 4          # 3 pf + 1 cf
    level_types_available: [single_level, pressure, isentropic, oceanic]
    notes:
      - "比 ECMWF 多 14 天；变量集合几乎与 ECMWF 一致"
      - "实测 daily.tcc 偶发 SSL EOF —— ECDS 该资源缓存有时不稳"

  iap_cas:
    label: "IAP-CAS (China — Institute of Atmospheric Physics)"
    model: "FGOALS-f2-S2S (atmospheric coupled S2S system)"
    max_leadtime_h: 1560          # 65 天 — 5 家里最长
    leadtime:
      inst_step_h: 6
      daily_window_h: 24
      pressure_step_h: 24
    init:
      cadence: "weekly (typ. Mon 00z)"
      cycles: [0]
    ensemble:
      control: 1
      perturbed_total: 4
    level_types_available: [single_level, pressure, oceanic]
    notes:
      - "**没有 MSLP / 通量 / 土壤 / CAPE / 对流降水**"
      - "新能源任务请用 `surface_pressure` 替代 `mean_sea_level_pressure`"
      - "单层只有 20 个变量(5 家最少)"

  ncep:
    label: "NCEP (USA — Climate Forecast System v2)"
    model: "CFSv2 (T126L64 atmos + MOM4 ocean)"
    max_leadtime_h: 1056          # 44 天 — 5 家里最短
    leadtime:
      inst_step_h: 6
      daily_window_h: 24
      pressure_step_h: 24
    init:
      cadence: "daily 00z"
      cycles: [0]
    ensemble:
      control: 1
      perturbed_total: 16         # 4 lagged inits × 4 members
    level_types_available: [single_level, pressure, isentropic]
    notes:
      - "无 oceanic level_type"
      - "覆盖度仅 44 天但变量丰富 (35 个单层 + 全套压力层)"

  ukmo:
    label: "UKMO (UK Met Office — GloSea)"
    model: "GloSea6 (UM atmos + NEMO ocean)"
    max_leadtime_h: 1440          # 60 天
    leadtime:
      inst_step_h: 6
      daily_window_h: 24
      pressure_step_h: 24
    init:
      cadence: "daily 00z (lagged ensemble)"
      cycles: [0]
    ensemble:
      control: 1
      perturbed_total: 7          # 1 cf + 6 pf per init; lagged 4d → ~28
    level_types_available: [single_level, pressure]
    notes:
      - "无 isentropic / oceanic level_type"
      - "**没有 MSLP / 通量 / 土壤 / CAPE / 对流降水**"
      - "新能源任务用 `surface_pressure` 替代 `mean_sea_level_pressure`"
